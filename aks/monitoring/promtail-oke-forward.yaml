# Promtail Configuration for Forwarding Logs to OKE Central Hub
# This configuration adds a second client to forward logs to OKE Loki
#
# Usage:
# 1. Merge this configuration with your existing loki-values.yaml

# Promtail configuration for dual forwarding (local + OKE)
promtail:
  enabled: true
  config:
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      # Local Loki (keep existing for local access)
      - url: http://loki-stack.loki-stack.svc.cluster.local:3100/loki/api/v1/push
      
      # OKE Central Hub Loki Gateway (Secure Ingress)
      - url: https://observability.canepro.me/loki/loki/api/v1/push
        basic_auth:
          username: observability-user
          password: 50JjX+diU6YmAZPl
        # Required for multi-tenancy (if enabled in OKE Loki)
        headers:
          X-Scope-OrgID: "1"
    
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
          # Add cluster identifier to all logs
          - labels:
              cluster: rocket-chat-aks
              environment: production
              region: azure
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - action: replace
            source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: "/"
            regex: (.*)/(.*)
            replacement: /var/log/pods/*$1/*$2/*.log
            target_label: __path__
