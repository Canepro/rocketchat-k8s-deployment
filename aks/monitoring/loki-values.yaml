# Loki Stack Configuration for Rocket.Chat Logging with OKE Forwarding
# Deployed in monitoring namespace for centralized logging

loki:
  image:
    tag: "2.9.0"
  persistence:
    enabled: true
    size: 50Gi
    storageClassName: default

  config:
    auth_enabled: false
    server:
      http_listen_port: 3100
    ingester:
      chunk_idle_period: 5m
      chunk_retain_period: 30s
    storage_config:
      boltdb_shipper:
        active_index_directory: /data/index
        cache_location: /data/cache
        cache_ttl: 168h
        shared_store: filesystem
    schema_config:
      configs:
        - from: 2020-05-15
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
    limits_config:
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      volume_enabled: true

# Promtail configuration - ONLY forward to OKE (simpler config)
promtail:
  enabled: true
  
  # Override the default config template entirely
  configmap:
    enabled: false
  
  config:
    # Disable default client to loki-stack
    clients:
      # Only OKE Central Hub Loki Gateway (Secure)
      - url: https://observability.canepro.me/loki/loki/api/v1/push
        basic_auth:
          username: observability-user
          password: 50JjX+diU6YmAZPl
        headers:
          X-Scope-OrgID: "1"
    
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      
    positions:
      filename: /run/promtail/positions.yaml
    
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
          - static_labels:
              cluster: rocket-chat-aks
              environment: production
              region: azure
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - action: replace
            source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: "/"
            regex: (.*)/(.*)
            replacement: /var/log/pods/*$1/*$2/*.log
            target_label: __path__

# Disable Grafana (we already have it deployed)
grafana:
  enabled: false

# Resource limits for Loki components
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# Service configuration
service:
  type: ClusterIP
  port: 3100
  annotations: {}

# Node selector and tolerations for AKS
nodeSelector: {}
tolerations: []
affinity: {}
